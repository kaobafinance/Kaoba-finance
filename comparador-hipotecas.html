<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaoba Finance | Comparador de Hipotecas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f6fa;
  margin:0;
}
header{
  background:#0d4f8b;
  color:#fff;
  padding:25px;
  text-align:center;
}
main{
  max-width:1100px;
  margin:30px auto;
  background:#fff;
  padding:30px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
}
h2{color:#0d4f8b;}

label{display:block;margin-top:10px;}
input,select{
  width:100%;
  padding:8px;
  margin-top:4px;
  border:1px solid #d1d5db;
  border-radius:6px;
}

button{
  background:#0d4f8b;
  color:#fff;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  margin-top:15px;
  transition:0.2s;
}
button:hover{background:#09407a;}

.banco-card{
  border:1px solid #e3e8ef;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
  position:relative;
  background:#fafbff;
  transition:0.25s;
}
.banco-card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* BOTÓN ELIMINAR PREMIUM */
.remove-btn{
  position:absolute;
  top:15px;
  right:15px;
  width:28px;
  height:28px;
  border-radius:50%;
  background:#fff;
  color:#dc3545;
  font-size:18px;
  font-weight:bold;
  border:none;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.2s;
}
.remove-btn:hover{
  background:#dc3545;
  color:#fff;
  transform:scale(1.1);
}

.table-container{
  overflow-x:auto;
  margin-top:20px;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:10px;
  border-bottom:1px solid #e5e7eb;
  text-align:center;
}
th{background:#f1f3f6;}

.mejor{
  background:#198754 !important;
  color:#fff;
}

@media(max-width:600px){
  main{margin:15px;padding:20px;}
}
</style>
</head>

<body>

<header>
<h1>Kaoba Finance</h1>
<p>Comparador profesional de hipotecas</p>
</header>

<main>

<h2>Datos generales</h2>

<label>Capital (€)
<input type="number" id="capital" value="" placeholder="Ej: 150000" onfocus="clearInput(this)">
</label>

<label>Plazo total (años)
<input type="number" id="plazo" value="" placeholder="Ej: 20" onfocus="clearInput(this)">
</label>

<label>Euríbor actual (%)
<input type="number" id="euribor" value="" placeholder="Ej: 3.50" step="0.01" onfocus="clearInput(this)">
</label>

<hr>

<h2>Ofertas bancarias</h2>
<div id="bancos"></div>
<button onclick="addBanco()">+ Añadir banco</button>

<hr>

<h2>Resultados</h2>

<label>Nombre
<input type="text" id="nombreUsuario" placeholder="Tu nombre" onfocus="clearInput(this)">
</label>

<label>Email
<input type="email" id="emailUsuario" placeholder="tuemail@ejemplo.com" onfocus="clearInput(this)">
</label>

<label>
<input type="checkbox" id="acepta">
Acepto política de privacidad
</label>

<button onclick="calcular()">Calcular</button>
<button onclick="descargarPDF()">Descargar PDF</button>

<div class="table-container">
<table id="tabla">
<thead>
<tr>
<th>Banco</th>
<th>Tipo</th>
<th>Cuota media</th>
<th>Intereses</th>
<th>Total</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</main>

<script>
let contador=0;

function clearInput(input){ input.value=""; }

function addBanco(){
  contador++;
  const div=document.createElement("div");
  div.className="banco-card";
  div.id="banco-"+contador;
  div.innerHTML=`
  <button class="remove-btn" onclick="removeBanco(${contador})">×</button>
  <label>Nombre
  <input type="text" id="nombre-${contador}" placeholder="Banco ${contador}" onfocus="clearInput(this)">
  </label>

  <label>Tipo
  <select id="tipo-${contador}" onchange="toggleTipo(${contador})">
    <option value="fija">Fija</option>
    <option value="mixta">Mixta</option>
    <option value="variable">Variable</option>
  </select>
  </label>

  <div id="bloque-fija-${contador}">
    <label>TIN fijo (%)
    <input type="number" id="tinFijo-${contador}" step="0.01" onfocus="clearInput(this)">
    </label>
  </div>

  <div id="bloque-mixta-${contador}" style="display:none;">
    <label>Meses fijo
    <input type="number" id="mesesFijo-${contador}" value="" onfocus="clearInput(this)">
    </label>
    <label>TIN fijo (%)
    <input type="number" id="tinMixtoFijo-${contador}" step="0.01" onfocus="clearInput(this)">
    </label>
    <label>Diferencial (%)
    <input type="number" id="diferencial-${contador}" step="0.01" onfocus="clearInput(this)">
    </label>
  </div>

  <div id="bloque-variable-${contador}" style="display:none;">
    <label>Diferencial (%)
    <input type="number" id="difVar-${contador}" step="0.01" onfocus="clearInput(this)">
    </label>
  </div>

  <label>Amortización anticipada (€ opcional)
  <input type="number" id="amortizacion-${contador}" value="" onfocus="clearInput(this)">
  </label>
  `;
  document.getElementById("bancos").appendChild(div);
}

function removeBanco(id){
  const div=document.getElementById("banco-"+id);
  div.style.opacity="0";
  div.style.transform="scale(0.9)";
  setTimeout(()=>div.remove(),200);
}

function toggleTipo(id){
  const tipo=document.getElementById("tipo-"+id).value;
  document.getElementById("bloque-fija-"+id).style.display=tipo==="fija"?"block":"none";
  document.getElementById("bloque-mixta-"+id).style.display=tipo==="mixta"?"block":"none";
  document.getElementById("bloque-variable-"+id).style.display=tipo==="variable"?"block":"none";
}

function cuota(capital,tin,plazo){
  const i=tin/100/12;
  return (capital*i*Math.pow(1+i,plazo))/(Math.pow(1+i,plazo)-1);
}

function calcular(){
  const capital=parseFloat(document.getElementById("capital").value)||0;
  const plazo=parseInt(document.getElementById("plazo").value)||1;
  const euribor=parseFloat(document.getElementById("euribor").value)||0;

  if(capital<=0||plazo<=0){ alert("Introduce capital y plazo correctos"); return; }

  const tbody=document.querySelector("#tabla tbody");
  tbody.innerHTML="";
  let resultados=[];

  for(let i=1;i<=contador;i++){
    const div=document.getElementById("banco-"+i);
    if(!div) continue;

    const nombre=document.getElementById("nombre-"+i).value||("Banco "+i);
    const tipo=document.getElementById("tipo-"+i).value;
    let cuotaMedia=0, intereses=0;

    if(tipo==="fija"){
      const tin=parseFloat(document.getElementById("tinFijo-"+i).value)||0;
      cuotaMedia=cuota(capital,tin,plazo*12);
      intereses=cuotaMedia*plazo*12-capital;
    }

    if(tipo==="variable"){
      const dif=parseFloat(document.getElementById("difVar-"+i).value)||0;
      const tin=euribor+dif;
      cuotaMedia=cuota(capital,tin,plazo*12);
      intereses=cuotaMedia*plazo*12-capital;
    }

    if(tipo==="mixta"){
      const mesesFijo=parseInt(document.getElementById("mesesFijo-"+i).value)||0;
      const tinFijo=parseFloat(document.getElementById("tinMixtoFijo-"+i).value)||0;
      const dif=parseFloat(document.getElementById("diferencial-"+i).value)||0;

      const cuotaFija=cuota(capital,tinFijo,mesesFijo);
      const capitalRestante=capital - (cuotaFija*mesesFijo - capital);
      const tinVar=euribor+dif;
      const cuotaVar=cuota(capitalRestante,tinVar,(plazo*12)-mesesFijo);

      cuotaMedia=((cuotaFija*mesesFijo)+(cuotaVar*((plazo*12)-mesesFijo)))/(plazo*12);
      intereses=cuotaFija*mesesFijo+cuotaVar*((plazo*12)-mesesFijo)-capital;
    }

    const total=capital+intereses;
    resultados.push({nombre,tipo,cuotaMedia,intereses,total});
  }

  resultados.sort((a,b)=>a.total-b.total);

  resultados.forEach((r,index)=>{
    const row=document.createElement("tr");
    if(index===0) row.classList.add("mejor");
    row.innerHTML=`
      <td>${r.nombre}</td>
      <td>${r.tipo}</td>
      <td>${r.cuotaMedia.toFixed(2)} €</td>
      <td>${r.intereses.toFixed(2)} €</td>
      <td>${r.total.toFixed(2)} €</td>
    `;
    tbody.appendChild(row);
  });
}

function descargarPDF(){
  const nombreUsuario=document.getElementById("nombreUsuario").value.trim();
  const emailUsuario=document.getElementById("emailUsuario").value.trim();
  const acepta=document.getElementById("acepta").checked;

  if(!nombreUsuario || !emailUsuario){ alert("Debes introducir tu nombre y correo para descargar el PDF"); return; }
  if(!acepta){ alert("Debes aceptar la política de privacidad"); return; }

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  doc.text(`Comparativa Hipotecas - ${nombreUsuario}`,20,20);
  doc.autoTable({html:'#tabla',startY:30});
  doc.save("Comparativa_Hipotecas.pdf");
}
</script>

</body>
</html>
