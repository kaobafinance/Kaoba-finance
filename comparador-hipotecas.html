<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaoba Finance | Comparador de Hipotecas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f6fa;}
header{background:#0d4f8b;color:#fff;text-align:center;padding:25px;}
main{max-width:1100px;margin:30px auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,0.05);}
h2{color:#0d4f8b;}
label{display:block;margin-top:10px;font-weight:600;}
input,select{width:100%;padding:8px;margin-top:4px;border:1px solid #d1d5db;border-radius:6px;}
button{background:#0d4f8b;color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;margin-top:15px;transition:0.2s;}
button:hover{background:#09407a;}
.banco-card{border:1px solid #e3e8ef;padding:20px;border-radius:12px;margin-top:20px;position:relative;background:#fafbff;transition:0.25s;}
.banco-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,0.08);}
.remove-btn{position:absolute;top:15px;right:15px;width:28px;height:28px;border-radius:50%;background:#fff;color:#dc3545;font-size:18px;font-weight:bold;border:none;box-shadow:0 2px 6px rgba(0,0,0,0.15);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s;}
.remove-btn:hover{background:#dc3545;color:#fff;transform:scale(1.1);}
.table-container{overflow-x:auto;margin-top:20px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:center;}
th{background:#f1f3f6;}
.mejor{background:#198754 !important;color:#fff;}
.amort-table{margin-top:15px;width:100%;border-collapse:collapse;}
.amort-table th, .amort-table td{border:1px solid #ddd;padding:6px;font-size:13px;text-align:center;}
.amort-toggle{color:#0d4f8b;text-decoration:underline;cursor:pointer;font-weight:600;margin-top:8px;display:inline-block;}
</style>
</head>

<body>
<header>
<h1>Kaoba Finance</h1>
<p>Comparador profesional de hipotecas</p>
</header>

<main>
<h2>Datos generales</h2>
<label>Capital (€)
<input type="number" id="capital" value="0" onfocus="clearZero(this)">
</label>
<label>Plazo total (años)
<input type="number" id="plazo" value="20" step="0.5" onfocus="clearZero(this)">
</label>
<label>Euríbor actual (%)
<input type="number" id="euribor" value="3.50" step="0.01">
</label>

<hr>
<h2>Ofertas bancarias</h2>
<div id="bancos"></div>
<button onclick="addBanco()">+ Añadir banco</button>

<hr>
<h2>Resultados</h2>
<label>Nombre
<input type="text" id="nombreUsuario" placeholder="Tu nombre">
</label>
<label>Email
<input type="email" id="emailUsuario" placeholder="tu@email.com">
</label>
<label><input type="checkbox" id="acepta"> Acepto política de privacidad</label>

<button onclick="calcular()">Calcular</button>
<button onclick="descargarPDF()">Descargar PDF</button>

<div class="table-container">
<table id="tabla">
<thead>
<tr><th>Banco</th><th>Tipo</th><th>Cuota media</th><th>Intereses</th><th>Total</th><th>Amortización</th></tr>
</thead>
<tbody></tbody>
</table>
</div>
</main>

<script>
let contador=0;
function clearZero(input){ if(input.value==="0") input.value=""; }

function addBanco(){
  contador++;
  const div=document.createElement("div");
  div.className="banco-card";
  div.id="banco-"+contador;
  div.innerHTML=`
    <button class="remove-btn" onclick="removeBanco(${contador})">×</button>
    <label>Nombre
      <input type="text" id="nombre-${contador}" placeholder="Banco ${contador}">
    </label>
    <label>Tipo
      <select id="tipo-${contador}" onchange="toggleTipo(${contador})">
        <option value="fija">Fija</option>
        <option value="mixta">Mixta</option>
        <option value="variable">Variable</option>
      </select>
    </label>
    <div id="bloque-fija-${contador}">
      <label>TIN fijo (%)
        <input type="number" id="tinFijo-${contador}" step="0.01">
      </label>
    </div>
    <div id="bloque-mixta-${contador}" style="display:none;">
      <label>Meses fijo
        <input type="number" id="mesesFijo-${contador}" value="60">
      </label>
      <label>TIN fijo (%)
        <input type="number" id="tinMixtoFijo-${contador}" step="0.01">
      </label>
      <label>Diferencial (%)
        <input type="number" id="diferencial-${contador}" step="0.01">
      </label>
    </div>
    <div id="bloque-variable-${contador}" style="display:none;">
      <label>Diferencial (%)
        <input type="number" id="difVar-${contador}" step="0.01">
      </label>
    </div>
    <label><input type="checkbox" id="amortSi-${contador}" onchange="calcular()"> Se cobra comisión por amortización</label>
  `;
  document.getElementById("bancos").appendChild(div);
}

function removeBanco(id){
  const div=document.getElementById("banco-"+id);
  div.style.opacity="0";
  div.style.transform="scale(0.9)";
  setTimeout(()=>div.remove(),200);
}

function toggleTipo(id){
  const tipo=document.getElementById("tipo-"+id).value;
  document.getElementById("bloque-fija-"+id).style.display=tipo==="fija"?"block":"none";
  document.getElementById("bloque-mixta-"+id).style.display=tipo==="mixta"?"block":"none";
  document.getElementById("bloque-variable-"+id).style.display=tipo==="variable"?"block":"none";
}

function generarAmortizacion(capital, tin, plazoMeses, tipo, amortSi){
  const amortRows=[];
  let capPend=capital;
  for(let m=1;m<=plazoMeses;m++){
    const i=tin/100/12;
    let cuotaBase=(capPend*i*Math.pow(1+i,1))/(Math.pow(1+i,1)-1);
    let amortizacion=0;
    if(amortSi){
      if(tipo==="fija"){
        const año=Math.ceil(m/12);
        if(año<=10) amortizacion=capPend*0.02/12;
        else if(año<=20) amortizacion=capPend*0.015/12;
      }
      if(tipo==="mixta"){
        const año=Math.ceil(m/12);
        if(año<=3) amortizacion=capPend*0.0025;
        else if(año<=5) amortizacion=capPend*0.0015;
      }
    }
    const cuotaTotal=cuotaBase+amortizacion;
    capPend-=amortizacion;
    amortRows.push({mes:m, cuota:cuotaTotal.toFixed(2), amort:amortizacion.toFixed(2), pendiente:capPend.toFixed(2)});
  }
  return amortRows;
}

function calcular(){
  const capital=parseFloat(document.getElementById("capital").value)||0;
  const plazoAños=parseFloat(document.getElementById("plazo").value)||1;
  const plazoMeses=Math.round(plazoAños*12);
  const euribor=parseFloat(document.getElementById("euribor").value)||0;

  const tbody=document.querySelector("#tabla tbody");
  tbody.innerHTML="";
  const resultados=[];

  for(let i=1;i<=contador;i++){
    const div=document.getElementById("banco-"+i);
    if(!div) continue;

    const nombre=document.getElementById("nombre-"+i).value||("Banco "+i);
    const tipo=document.getElementById("tipo-"+i).value;
    const amortSi=document.getElementById("amortSi-"+i).checked;
    let cuotaMedia=0, intereses=0, amortRows=[];

    if(tipo==="fija"){
      const tin=parseFloat(document.getElementById("tinFijo-"+i).value)||0;
      amortRows=generarAmortizacion(capital, tin, plazoMeses, tipo, amortSi);
    } else if(tipo==="variable"){
      const dif=parseFloat(document.getElementById("difVar-"+i).value)||0;
      const tin=euribor+dif;
      amortRows=generarAmortizacion(capital, tin, plazoMeses, tipo, amortSi);
    } else if(tipo==="mixta"){
      const mesesFijo=parseInt(document.getElementById("mesesFijo-"+i).value)||0;
      const tinFijo=parseFloat(document.getElementById("tinMixtoFijo-"+i).value)||0;
      const dif=parseFloat(document.getElementById("diferencial-"+i).value)||0;
      const amortFija=generarAmortizacion(capital, tinFijo, mesesFijo, "fija", amortSi);
      const restante=capital-amortFija.reduce((a,b)=>a+parseFloat(b.amort),0);
      const amortVariable=generarAmortizacion(restante, euribor+dif, plazoMeses-mesesFijo, "variable", amortSi);
      amortRows=[...amortFija,...amortVariable];
    }

    cuotaMedia=amortRows.reduce((a,b)=>a+parseFloat(b.cuota),0)/plazoMeses;
    intereses=amortRows.reduce((a,b)=>a+parseFloat(b.cuota),0)-capital;
    resultados.push({nombre,tipo,cuotaMedia,intereses,total:capital+intereses,amortRows});
  }

  resultados.sort((a,b)=>a.total-b.total);
  tbody.innerHTML="";

  resultados.forEach((r,index)=>{
    const row=document.createElement("tr");
    if(index===0) row.classList.add("mejor");
    row.innerHTML=`
      <td>${r.nombre}</td>
      <td>${r.tipo}</td>
      <td>${r.cuotaMedia.toFixed(2)} €</td>
      <td>${r.intereses.toFixed(2)} €</td>
      <td>${r.total.toFixed(2)} €</td>
      <td><span class="amort-toggle" onclick="toggleAmort(${index})">Ver</span>
      <div id="amort-${index}" style="display:none;"></div>
      </td>
    `;
    tbody.appendChild(row);

    const amortDiv=document.getElementById("amort-"+index);
    let html="<table class='amort-table'><tr><th>Mes</th><th>Cuota</th><th>Amortización</th><th>Pendiente</th></tr>";
    r.amortRows.forEach(m=>{
      html+=`<tr><td>${m.mes}</td><td>${m.cuota} €</td><td>${m.amort} €</td><td>${m.pendiente} €</td></tr>`;
    });
    html+="</table>";
    amortDiv.innerHTML=html;
  });
}

function toggleAmort(index){
  const div=document.getElementById("amort-"+index);
  div.style.display=div.style.display==="none"?"block":"none";
}

function descargarPDF(){
  const nombre=document.getElementById("nombreUsuario").value.trim();
  const email=document.getElementById("emailUsuario").value.trim();
  if(!nombre||!email){ alert("Debes completar nombre y correo para descargar PDF"); return; }
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  doc.text("Comparativa Hipotecas - Kaoba Finance",20,20);
  doc.autoTable({html:'#tabla',startY:30});
  doc.save("Comparativa.pdf");
}
</script>
</body>
</html>
