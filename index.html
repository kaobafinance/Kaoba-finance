<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador Hipotecario</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Simulador Hipotecario</h1>

<div class="grid">
  <div>
    <label>Precio vivienda (€)</label>
    <input id="precio" type="number" value="300000">
  </div>
  <div>
    <label>Ahorros disponibles (€)</label>
    <input id="entrada" type="number" value="60000">
  </div>
  <div>
    <label>Interés anual (%)</label>
    <input id="interes" type="number" step="0.1" value="2.5">
  </div>
  <div>
    <label>Plazo (años)</label>
    <input id="años" type="number" value="30">
  </div>
  <div>
    <label>Comunidad autónoma</label>
    <select id="comunidad">
      <option value="0.10">Andalucía (10%)</option>
      <option value="0.06">Madrid (6%)</option>
      <option value="0.10">Cataluña (10%)</option>
      <option value="0.08">Valencia (8%)</option>
      <option value="0.08">Galicia (8%)</option>
      <option value="0.08">Castilla y León (8%)</option>
    </select>
  </div>
</div>

<div class="cards">
  <div class="card"><p>Hipoteca necesaria</p><h3 id="capital"></h3></div>
  <div class="card"><p>Cuota mensual</p><h3 id="cuota"></h3></div>
  <div class="card"><p>Total intereses</p><h3 id="intereses"></h3></div>
  <div class="card"><p>Sueldo recomendado</p><h3 id="sueldo"></h3></div>
</div>

<div class="extra">
<p><strong>Gastos estimados compra:</strong> <span id="gastos"></span></p>
<p><strong>Entrada usada para gastos:</strong> <span id="entradaGastos"></span></p>
<p><strong>Entrada usada para vivienda:</strong> <span id="entradaCasa"></span></p>
<p><strong>Porcentaje financiado (LTV):</strong> <span id="ltv"></span></p>
</div>

<canvas id="grafico1"></canvas>

<button onclick="toggleTabla()">Ver tabla de amortización</button>

<div id="tablaContainer">
<h2>Tabla de amortización</h2>
<table id="tabla">
<thead>
<tr><th>Mes</th><th>Cuota</th><th>Interés</th><th>Capital</th><th>Restante</th></tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
<!-- Enlace al script externo -->
<script src="script.js"></script>

</body>
</html>
