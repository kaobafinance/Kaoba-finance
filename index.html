<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador Hipotecario</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f4f6f9;
  padding:20px;
  margin:0;
}
.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
h1{
  text-align:center;
  margin-bottom:30px;
  color:#222;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:20px;
}
input, select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:16px;
  box-sizing:border-box;
}
label{
  font-size:14px;
  color:#555;
}
button{
  width:100%;
  padding:14px;
  margin-top:15px;
  background:#0077ff;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  transition:0.2s;
}
button:hover{
  background:#005ccc;
}
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:25px;
}
.card{
  background:#f8f9fb;
  padding:15px;
  border-radius:10px;
  text-align:center;
  border:1px solid #eee;
}
.card p{
  margin:0;
  font-size:14px;
  color:#666;
}
.card h3{
  margin-top:6px;
  font-size:20px;
  color:#111;
}
.extra{
  margin-top:20px;
  padding:15px;
  background:#f2f4f7;
  border-radius:8px;
  font-size:15px;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:25px;
  font-size:14px;
}
th{
  background:#f1f3f6;
  padding:8px;
}
td{
  border-bottom:1px solid #eee;
  padding:6px;
}
tr:nth-child(even){
  background:#fafafa;
}
#tablaContainer{
  display:none;
  margin-top:20px;
}
#ltiMessage{
  margin-top:10px;
  font-weight:bold;
  font-size:15px;
}
@media (max-width:700px){
  .grid{
    grid-template-columns:1fr;
  }
  .cards{
    grid-template-columns:1fr 1fr;
  }
  .container{
    padding:20px;
  }
}
</style>
</head>
<body>
<div class="container">

<h1>Simulador Hipotecario</h1>

<div class="grid">
  <div>
    <label>Precio vivienda (€)</label>
    <input id="precio" type="number" value="€">
  </div>
  <div>
    <label>Ahorros disponibles (€)</label>
    <input id="entrada" type="number" value="€">
  </div>
  <div>
    <label>Interés anual (%)</label>
    <input id="interes" type="number" step="0.1" value="2.5">
  </div>
  <div>
    <label>Plazo (años)</label>
    <input id="años" type="number" value="30">
  </div>
  <div>
    <label>Salario neto anual (€)</label>
    <input id="salario" type="number" placeholder="Opcional">
  </div>
  <div>
    <label>Comunidad Autónoma</label>
    <select id="comunidad">
      <option value="0.10">Andalucía (10%)</option>
      <option value="0.06">Madrid (6%)</option>
      <option value="0.10">Cataluña (10%)</option>
      <option value="0.08">Valencia (8%)</option>
      <option value="0.08">Galicia (8%)</option>
      <option value="0.08">Castilla y León (8%)</option>
    </select>
  </div>
</div>

<div class="cards">
  <div class="card">
    <p>Hipoteca necesaria</p>
    <h3 id="capital"></h3>
  </div>
  <div class="card">
    <p>Cuota mensual</p>
    <h3 id="cuota"></h3>
  </div>
  <div class="card">
    <p>Total intereses</p>
    <h3 id="intereses"></h3>
  </div>
  <div class="card">
    <p>Entrada total usada</p>
    <h3 id="entradaTotal"></h3>
  </div>
</div>

<div class="extra">
  <p><strong>Porcentaje financiado (LTV):</strong> <span id="ltv"></span></p>
  <p id="ltiMessage"></p>
</div>

<button onclick="toggleTabla()">Ver tabla de amortización</button>

<div id="tablaContainer">
<h2>Tabla de amortización</h2>
<table id="tabla">
<thead>
<tr>
<th>Mes</th>
<th>Cuota</th>
<th>Interés</th>
<th>Capital</th>
<th>Restante</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
const precioInput=document.getElementById("precio");
const entradaInput=document.getElementById("entrada");
const interesInput=document.getElementById("interes");
const añosInput=document.getElementById("años");
const salarioInput=document.getElementById("salario");
const comunidadInput=document.getElementById("comunidad");
const ltiMessageEl=document.getElementById("ltiMessage");

const inputs=document.querySelectorAll("input, select");
inputs.forEach(i=>i.addEventListener("input",calcular));

function formatMoney(n){
  return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(n);
}

function toggleTabla(){
  const tabla=document.getElementById("tablaContainer");
  tabla.style.display = tabla.style.display==="none" ? "block" : "none";
}

function calcular(){
  let precio=parseFloat(precioInput.value) || 0;
  let ahorro=parseFloat(entradaInput.value) || 0;
  let interes=parseFloat(interesInput.value)/100/12 || 0;
  let años=parseFloat(añosInput.value) || 0;
  let salario=parseFloat(salarioInput.value) || 0;
  let itp=parseFloat(comunidadInput.value) || 0;

  // Gastos totales: impuestos + gastos fijos
  let gastosFijos=2500; // escritura, notaria, registro
  let impuestos = precio*itp;
  let entradaTotal = Math.min(ahorro, gastosFijos + impuestos);
  let entradaCasa=Math.max(0,ahorro-entradaTotal);
  let capital=precio-entradaCasa;

  let n=años*12;
  let cuota=capital*(interes*Math.pow(1+interes,n))/(Math.pow(1+interes,n)-1);
  let saldo=capital;

  let tbody=document.querySelector("#tabla tbody");
  tbody.innerHTML="";

  let totalIntereses=0;

  for(let i=1;i<=n;i++){
    let interesMes=saldo*interes;
    let capitalMes=cuota-interesMes;
    saldo-=capitalMes;
    totalIntereses+=interesMes;
    let row=`
      <tr>
      <td>${i}</td>
      <td>${formatMoney(cuota)}</td>
      <td>${formatMoney(interesMes)}</td>
      <td>${formatMoney(capitalMes)}</td>
      <td>${formatMoney(Math.max(saldo,0))}</td>
      </tr>
    `;
    tbody.innerHTML+=row;
  }

  document.getElementById("capital").innerText=formatMoney(capital);
  document.getElementById("cuota").innerText=formatMoney(cuota);
  document.getElementById("intereses").innerText=formatMoney(totalIntereses);
  document.getElementById("entradaTotal").innerText=formatMoney(entradaTotal + capital - (precio - entradaCasa));
  document.getElementById("ltv").innerText=((capital/precio)*100).toFixed(1)+"%";

  // Mensaje compatibilidad con salario
  if(salario>0){
      let max35 = salario*0.35/12;
      let max40 = salario*0.40/12;
      if(cuota <= max35){
          ltiMessageEl.style.color = "#0a0";
          ltiMessageEl.innerText = "La cuota es compatible con tu salario.";
      } else if(cuota > max35 && cuota <= max40){
          ltiMessageEl.style.color = "#f90";
          ltiMessageEl.innerText = "La cuota supera el 35% de tu salario, ten cuidado.";
      } else {
          ltiMessageEl.style.color = "#c00";
          let maxCompra = precio*(max40/cuota);
          ltiMessageEl.innerText = `La cuota supera el 40% de tu salario. Podrías permitirte hasta ${formatMoney(maxCompra)}.`;
      }
  } else{
      ltiMessageEl.innerText = "";
  }
}

calcular();
</script>
</div>
</body>
</html>
