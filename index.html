<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simula tu Hipoteca</title>
<style>
body{
  font-family:Arial, sans-serif;
  background:#f4f6f9;
  padding:20px;
  margin:0;
}
.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
h1{
  text-align:center;
  margin-bottom:15px;
  color:#222;
}
.resumen{
  background:#eef6ff;
  padding:12px 15px;
  border-radius:8px;
  margin-bottom:20px;
  font-size:16px;
  text-align:center;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:20px;
}
input, select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:16px;
  box-sizing:border-box;
}
label{
  font-size:14px;
  color:#555;
}
button{
  width:100%;
  padding:14px;
  margin-top:15px;
  background:#0077ff;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  transition:0.2s;
}
button:hover{
  background:#005ccc;
}
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:25px;
}
.card{
  background:#f8f9fb;
  padding:15px;
  border-radius:10px;
  text-align:center;
  border:1px solid #eee;
}
.card p{
  margin:0;
  font-size:14px;
  color:#666;
}
.card h3{
  margin-top:6px;
  font-size:20px;
  color:#111;
}
.extra{
  margin-top:20px;
  padding:15px;
  background:#f2f4f7;
  border-radius:8px;
  font-size:15px;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:25px;
  font-size:14px;
}
th{
  background:#f1f3f6;
  padding:8px;
}
td{
  border-bottom:1px solid #eee;
  padding:6px;
}
tr:nth-child(even){
  background:#fafafa;
}
#tablaContainer{
  display:none;
  margin-top:20px;
}
@media (max-width:700px){
  .grid{grid-template-columns:1fr;}
  .cards{grid-template-columns:1fr 1fr;}
  .container{padding:20px;}
}
</style>
</head>

<body>
<div class="container">
<h1>Simula tu hipoteca</h1>

<div class="resumen" id="resumen">Cargando resumen...</div>

<div class="grid">
  <div>
    <label>Precio vivienda (€)</label>
    <input id="precio" type="number" value="0€">
  </div>
  <div>
    <label>Ahorros disponibles (€)</label>
    <input id="entrada" type="number" value="0€">
  </div>
  <div>
    <label>Interés anual (%)</label>
    <input id="interes" type="number" step="0.1" value="2.5">
  </div>
  <div>
    <label>Plazo (años)</label>
    <input id="años" type="number" value="30">
  </div>
  <div>
    <label>Comunidad Autónoma (ITP)</label>
    <select id="comunidad">
      <option value="0.10">Andalucía (10%)</option>
      <option value="0.06">Madrid (6%)</option>
      <option value="0.10">Cataluña (10%)</option>
      <option value="0.08">Valencia (8%)</option>
      <option value="0.08">Galicia (8%)</option>
      <option value="0.08">Castilla y León (8%)</option>
    </select>
  </div>
  <div>
    <label>Ingreso neto anual (€)</label>
    <input id="salario" type="number" value="€">
  </div>
</div>

<div class="cards">
  <div class="card"><p>Importe de préstamo</p><h3 id="capital"></h3></div>
  <div class="card"><p>Cuota mensual</p><h3 id="cuota"></h3></div>
  <div class="card"><p>Total intereses</p><h3 id="intereses"></h3></div>
  <div class="card"><p>Sueldo recomendado</p><h3 id="sueldo"></h3></div>
  <div class="card"><p>% Financiación (LTV)</p><h3 id="ltv"></h3></div>
</div>

<div class="extra">
  <p><strong>Entrada / gastos totales:</strong> <span id="entradaTotal"></span></p>
  <p><strong>LTI:</strong> <span id="lti"></span></p>
  <p><strong>Compatible con salario:</strong> <span id="compatible"></span></p>
</div>

<button id="verTabla">Ver tabla de amortización</button>

<div id="tablaContainer">
  <h2>Tabla de amortización</h2>
  <table id="tabla">
    <thead>
      <tr><th>Mes</th><th>Cuota</th><th>Interés</th><th>Capital</th><th>Restante</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

</div>

<script>
// Debounce para que no se recalculen valores demasiado rápido
function debounce(func, wait) {
  let timeout;
  return function() {
    clearTimeout(timeout);
    timeout = setTimeout(func, wait);
  }
}

const precioInput = document.getElementById("precio");
const entradaInput = document.getElementById("entrada");
const interesInput = document.getElementById("interes");
const añosInput = document.getElementById("años");
const comunidadInput = document.getElementById("comunidad");
const salarioInput = document.getElementById("salario");

const inputs = [precioInput, entradaInput, interesInput, añosInput, comunidadInput, salarioInput];
inputs.forEach(input => input.addEventListener("input", debounce(calcular, 300)));

document.getElementById("verTabla").addEventListener("click", toggleTabla);

let amortizacionGenerada = false;

function formatMoney(n){
  return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(n);
}

function calcular(){
  let precio = parseFloat(precioInput.value) || 0;
  let ahorro = parseFloat(entradaInput.value) || 0;
  let interes = parseFloat(interesInput.value)/100/12 || 0;
  let años = parseFloat(añosInput.value) || 0;
  let comunidad = parseFloat(comunidadInput.value) || 0;
  let salario = parseFloat(salarioInput.value) || 0;

  let gastos = precio * comunidad + 2500; // ITP + escrituras
  let entradaCasa = Math.max(0, ahorro - gastos);
  let capital = precio - entradaCasa;
  let n = años*12;
  let cuota = capital*(interes*Math.pow(1+interes,n))/(Math.pow(1+interes,n)-1);
  let totalIntereses = cuota*n - capital;

  // Mostrar en tarjetas
  document.getElementById("capital").innerText = formatMoney(capital);
  document.getElementById("cuota").innerText = formatMoney(cuota);
  document.getElementById("intereses").innerText = formatMoney(totalIntereses);
  document.getElementById("sueldo").innerText = formatMoney(cuota/0.35);
  document.getElementById("ltv").innerText = (capital/precio*100).toFixed(1) + "%";

  document.getElementById("entradaTotal").innerText = formatMoney(entradaCasa + gastos);

  // LTI y compatibilidad
  let ltiVal = cuota*12 / salario;
  let ltiSpan = document.getElementById("lti");
  ltiSpan.innerText = (ltiVal*100).toFixed(1)+"%";
  if(ltiVal <= 0.35) ltiSpan.style.color = "green";
  else if(ltiVal <= 0.40) ltiSpan.style.color = "orange";
  else ltiSpan.style.color = "red";

  let compSpan = document.getElementById("compatible");
  if(ltiVal <= 0.35){
    compSpan.innerText = "Compatible";
    compSpan.style.color = "green";
  } else if(ltiVal <= 0.40){
    compSpan.innerText = "Aceptable";
    compSpan.style.color = "orange";
  } else {
    compSpan.innerText = "No viable";
    compSpan.style.color = "red";
  }

  // Resumen rápido con máximo precio posible según salario
  let maxCapital = salario*0.35/12 * n; 
  let maxPrecio = maxCapital + entradaCasa;
  document.getElementById("resumen").innerText = `Con tu salario neto anual de ${formatMoney(salario)}, podrías permitirte una vivienda de hasta ${formatMoney(maxPrecio)} con LTI ≤35%`;

  amortizacionGenerada = false;
}

function toggleTabla(){
  const tabla = document.getElementById("tablaContainer");
  tabla.style.display = tabla.style.display==="none" ? "block" : "none";
  if(tabla.style.display==="block") generarTabla();
}

function generarTabla(){
  if(amortizacionGenerada) return;
  let tbody = document.querySelector("#tabla tbody");
  tbody.innerHTML = "";

  let precio = parseFloat(precioInput.value) || 0;
  let ahorro = parseFloat(entradaInput.value) || 0;
  let interes = parseFloat(interesInput.value)/100/12 || 0;
  let años = parseFloat(añosInput.value) || 0;
  let comunidad = parseFloat(comunidadInput.value) || 0;

  let gastos = precio * comunidad + 2500;
  let entradaCasa = Math.max(0, ahorro - gastos);
  let capital = precio - entradaCasa;
  let n = años*12;
  let cuota = capital*(interes*Math.pow(1+interes,n))/(Math.pow(1+interes,n)-1);
  let saldo = capital;

  for(let i=1;i<=n;i++){
    let interesMes = saldo*interes;
    let capitalMes = cuota - interesMes;
    saldo -= capitalMes;
    tbody.innerHTML += `
      <tr>
        <td>${i}</td>
        <td>${formatMoney(cuota)}</td>
        <td>${formatMoney(interesMes)}</td>
        <td>${formatMoney(capitalMes)}</td>
        <td>${formatMoney(Math.max(saldo,0))}</td>
      </tr>`;
  }
  amortizacionGenerada = true;
}

// Inicial
calcular();
</script>

</body>
</html>
