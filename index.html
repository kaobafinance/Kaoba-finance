<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador Hipotecario</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:#f4f6f9;
  padding:40px;
}
.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
h1{text-align:center;margin-bottom:30px;}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
input{
  width:100%;
  padding:10px;
  font-size:16px;
}
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:20px;
}
.card{
  background:#f8f9fa;
  padding:15px;
  border-radius:8px;
  text-align:center;
}
.extra{
  margin-top:20px;
  background:#f1f3f5;
  padding:15px;
  border-radius:8px;
}
button{
  margin-top:20px;
  padding:12px;
  width:100%;
  background:#2c7be5;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}
button:hover{
  background:#1a68d1;
}
canvas{margin-top:30px;}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:30px;
}
th,td{
  padding:8px;
  border-bottom:1px solid #ddd;
  text-align:center;
}
th{background:#f1f1f1;}
#tablaContainer{display:none;}
</style>
</head>

<body>

<div class="container">

<h1>Simulador Hipotecario</h1>

<div class="grid">

<div>
<label>Precio vivienda (€)</label>
<input id="precio" type="number" value="300000">
</div>

<div>
<label>Ahorros disponibles (€)</label>
<input id="entrada" type="number" value="60000">
</div>

<div>
<label>Interés anual (%)</label>
<input id="interes" type="number" step="0.1" value="2.5">
</div>

<div>
<label>Plazo (años)</label>
<input id="años" type="number" value="30">
</div>

</div>

<div class="cards">
<div class="card">
<p>Hipoteca necesaria</p>
<h3 id="capital"></h3>
</div>
<div class="card">
<p>Cuota mensual</p>
<h3 id="cuota"></h3>
</div>
<div class="card">
<p>Total intereses</p>
<h3 id="intereses"></h3>
</div>
<div class="card">
<p>Sueldo recomendado</p>
<h3 id="sueldo"></h3>
</div>
</div>

<div class="extra">
<p><strong>Gastos estimados compra:</strong> <span id="gastos"></span></p>
<p><strong>Entrada usada para gastos:</strong> <span id="entradaGastos"></span></p>
<p><strong>Entrada usada para vivienda:</strong> <span id="entradaCasa"></span></p>
<p><strong>Porcentaje financiado (LTV):</strong> <span id="ltv"></span></p>
</div>

<canvas id="grafico1"></canvas>

<button onclick="toggleTabla()">Ver tabla de amortización</button>

<div id="tablaContainer">
<h2>Tabla de amortización</h2>
<table id="tabla">
<thead>
<tr>
<th>Mes</th>
<th>Cuota</th>
<th>Interés</th>
<th>Capital</th>
<th>Restante</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<!-- Enlace al script externo -->
<script src="script.js"></script>

</body>
</html>
