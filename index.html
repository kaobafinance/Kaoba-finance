<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador Hipotecario Rápido</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f4f6f9;
  padding:20px;
  margin:0;
}

.container{
  max-width:600px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  margin-bottom:25px;
  color:#222;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-bottom:20px;
}

label{
  font-size:14px;
  color:#555;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  background:#0077ff;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  background:#005ccc;
}

.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}

.card{
  background:#f8f9fb;
  padding:15px;
  border-radius:10px;
  text-align:center;
  border:1px solid #eee;
}

.card p{
  margin:0;
  font-size:14px;
  color:#666;
}

.card h3{
  margin-top:6px;
  font-size:20px;
  color:#111;
}

#ltiMessage{
  margin-top:15px;
  font-weight:bold;
  color:#c00;
}

#tablaContainer{
  display:none;
  margin-top:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th{
  background:#f1f3f6;
  padding:8px;
}

td{
  border-bottom:1px solid #eee;
  padding:6px;
}

tr:nth-child(even){
  background:#fafafa;
}

@media (max-width:500px){
  .grid{
    grid-template-columns:1fr;
  }
  .cards{
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>
<body>

<div class="container">
<h1>Simulador Hipotecario Rápido</h1>

<div class="grid">
  <div>
    <label>Precio vivienda (€)</label>
    <input id="precio" type="number" value="0">
  </div>
  <div>
    <label>Ahorros disponibles (€)</label>
    <input id="entrada" type="number" value="0">
  </div>
  <div>
    <label>Interés anual (%)</label>
    <input id="interes" type="number" step="0.1" value="2.5">
  </div>
  <div>
    <label>Plazo (años)</label>
    <input id="años" type="number" value="30">
  </div>
  <div>
    <label>Comunidad Autónoma</label>
    <select id="comunidad">
      <option value="0.10">Andalucía (10%)</option>
      <option value="0.06">Madrid (6%)</option>
      <option value="0.10">Cataluña (10%)</option>
      <option value="0.08">Valencia (8%)</option>
      <option value="0.08">Galicia (8%)</option>
      <option value="0.08">Castilla y León (8%)</option>
    </select>
  </div>
  <div>
    <label>Salario neto anual (€)</label>
    <input id="salario" type="number" value="0">
  </div>
</div>

<div class="cards">
  <div class="card">
    <p>Hipoteca necesaria</p>
    <h3 id="capital">€0</h3>
  </div>
  <div class="card">
    <p>Cuota mensual</p>
    <h3 id="cuota">€0</h3>
  </div>
  <div class="card">
    <p>Sueldo recomendado</p>
    <h3 id="sueldo">€0</h3>
  </div>
  <div class="card">
    <p>Entrada usada</p>
    <h3 id="entradaUsada">€0</h3>
  </div>
</div>

<div id="ltiMessage"></div>

<button onclick="generarTabla()">Ver tabla de amortización</button>

<div id="tablaContainer">
  <h2>Tabla de amortización</h2>
  <table id="tabla">
    <thead>
      <tr>
        <th>Mes</th>
        <th>Cuota</th>
        <th>Interés</th>
        <th>Capital</th>
        <th>Restante</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const precioInput = document.getElementById("precio");
const entradaInput = document.getElementById("entrada");
const interesInput = document.getElementById("interes");
const añosInput = document.getElementById("años");
const comunidadInput = document.getElementById("comunidad");
const salarioInput = document.getElementById("salario");

const capitalEl = document.getElementById("capital");
const cuotaEl = document.getElementById("cuota");
const sueldoEl = document.getElementById("sueldo");
const entradaUsadaEl = document.getElementById("entradaUsada");
const ltiMessageEl = document.getElementById("ltiMessage");

function formatMoney(n){
  return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(n);
}

function calcular(){
  let precio = parseFloat(precioInput.value) || 0;
  let ahorro = parseFloat(entradaInput.value) || 0;
  let interes = (parseFloat(interesInput.value)/100/12) || 0;
  let años = parseFloat(añosInput.value) || 0;
  let itp = parseFloat(comunidadInput.value) || 0.08;
  let salario = parseFloat(salarioInput.value) || 0;

  let gastos = 2500 + precio*itp;
  let entradaUsada = Math.min(ahorro, gastos + precio);
  let entradaCasa = Math.max(0, ahorro - gastos);
  let capital = precio - entradaCasa;
  let n = años*12;
  let cuota = n>0 ? capital*(interes*Math.pow(1+interes,n))/(Math.pow(1+interes,n)-1) : 0;

  capitalEl.innerText = formatMoney(capital);
  cuotaEl.innerText = formatMoney(cuota);
  sueldoEl.innerText = formatMoney(cuota/0.35);
  entradaUsadaEl.innerText = formatMoney(entradaUsada);

  if(salario>0){
    let maxCuota = salario*0.35/12;
    if(cuota > maxCuota){
      let maxCompra = precio*(maxCuota/cuota);
      ltiMessageEl.innerText = `La cuota supera el 35% de tu salario. Podrías permitirte hasta ${formatMoney(maxCompra)}.`;
    }else{
      ltiMessageEl.innerText = "La cuota es compatible con tu salario.";
    }
  }else{
    ltiMessageEl.innerText = "";
  }
}

// Recalcular al escribir (sin tabla)
[precioInput, entradaInput, interesInput, añosInput, comunidadInput, salarioInput].forEach(el=>{
  el.addEventListener("input", calcular);
});

calcular();

// Tabla solo al pedirla
function generarTabla(){
  let tbody = document.querySelector("#tabla tbody");
  tbody.innerHTML = "";
  let precio = parseFloat(precioInput.value) || 0;
  let ahorro = parseFloat(entradaInput.value) || 0;
  let interes = (parseFloat(interesInput.value)/100/12) || 0;
  let años = parseFloat(añosInput.value) || 0;
  let gastos = 2500 + precio*parseFloat(comunidadInput.value || 0.08);
  let entradaCasa = Math.max(0, ahorro - gastos);
  let capital = precio - entradaCasa;
  let n = años*12;
  let cuota = n>0 ? capital*(interes*Math.pow(1+interes,n))/(Math.pow(1+interes,n)-1) : 0;
  let saldo = capital;

  for(let i=1;i<=n;i++){
    let interesMes = saldo*interes;
    let capitalMes = cuota - interesMes;
    saldo -= capitalMes;
    let row = `<tr>
      <td>${i}</td>
      <td>${formatMoney(cuota)}</td>
      <td>${formatMoney(interesMes)}</td>
      <td>${formatMoney(capitalMes)}</td>
      <td>${formatMoney(Math.max(saldo,0))}</td>
    </tr>`;
    tbody.innerHTML += row;
  }
  document.getElementById("tablaContainer").style.display="block";
}
</script>

</body>
</html>
